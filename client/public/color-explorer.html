  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=Manrope:wght@400;500;600&display=swap"
    rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Manrope', sans-serif;
      background: #0f0f12;
      color: #e4e4e7;
      padding: 2rem;
      min-height: 100vh;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 1.75rem;
      margin-bottom: 0.5rem;
    }

    p.subtitle {
      color: #71717a;
      margin-bottom: 2rem;
    }

    .palettes {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 2rem;
    }

    .palette-card {
      background: #18181b;
      border-radius: 1rem;
      padding: 1.5rem;
      border: 1px solid #27272a;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .palette-card:hover {
      border-color: #3f3f46;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .palette-card.selected {
      border-color: #a78bfa;
      box-shadow: 0 0 0 2px #a78bfa40;
    }

    .palette-name {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      margin-bottom: 0.5rem;
    }

    .palette-desc {
      font-size: 0.8rem;
      color: #71717a;
      margin-bottom: 1rem;
    }

    .preview {
      border-radius: 0.75rem;
      overflow: hidden;
      margin-top: 1rem;
    }

    .preview-hero {
      padding: 1.5rem;
      min-height: 100px;
    }

    .preview-hero h2 {
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 0.5rem;
    }

    .preview-hero p {
      font-size: 0.7rem;
      opacity: 0.85;
      line-height: 1.4;
    }

    .preview-buttons {
      padding: 1rem;
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .preview-btn {
      padding: 0.4rem 0.75rem;
      border-radius: 9999px;
      font-size: 0.7rem;
      font-weight: 600;
      border: none;
      cursor: default;
    }

    .preview-card {
      margin: 1rem;
      padding: 0.75rem;
      border-radius: 0.5rem;
      font-size: 0.7rem;
      line-height: 1.4;
    }

    .swatches {
      display: flex;
      gap: 0.5rem;
      margin-top: 1rem;
      flex-wrap: wrap;
    }

    .swatch {
      width: 2rem;
      height: 2rem;
      border-radius: 0.375rem;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .selected-label {
      font-size: 0.75rem;
      color: #a78bfa;
      margin-top: 0.5rem;
      display: none;
    }

    .palette-card.selected .selected-label {
      display: block;
    }
  </style>
</head>

        <div class="palette-desc">${p.desc}</div>
        <div class="swatches">
          <div class="swatch" style="background:${p.btnPrimary}" title="Primary"></div>
          <div class="swatch" style="background:${p.secondary}" title="Secondary"></div>

        <div class="preview">

          </div>
          <div class="preview-buttons" style="background:${p.heroBg}">
